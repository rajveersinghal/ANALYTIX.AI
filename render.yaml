services:
  - type: web
    name: analytix-api
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.x
      - key: MONGODB_URL
        sync: false
      - key: DATABASE_NAME
        value: "analytix_db"
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: JWT_ALGORITHM
        value: "HS256"
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "1440"
      - key: GEMINI_API_KEY
        sync: false
      - key: FRONTEND_URL
        value: "https://analytix-ai-frontend.vercel.app"
    autoDeploy: true
